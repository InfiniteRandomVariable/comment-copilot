name: Comment Copilot CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  phase-boundary-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Phase Boundary Check
        run: pnpm verify:phase-boundary

  validate:
    needs: [phase-boundary-check]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: CI Check Suite
        run: pnpm ci:check

      - name: Summarize OAuth Test Report
        if: always()
        run: pnpm report:web:oauth:junit

      - name: Upload OAuth Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oauth-vitest-junit
          path: apps/web/test-results/oauth.junit.xml
          if-no-files-found: warn

      - name: Upload Webhooks E2E Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webhooks-e2e-vitest-junit
          path: apps/web/test-results/webhooks.e2e.junit.xml
          if-no-files-found: warn
